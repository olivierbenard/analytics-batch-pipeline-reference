repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.8
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: poetry run mypy batch_pipeline_reference/
        language: system
        pass_filenames: false

      - id: pylint
        name: pylint
        entry: poetry run pylint --disable=missing-module-docstring batch_pipeline_reference/
        language: system
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: poetry run pytest -q
        language: system
        pass_filenames: false
        stages: [manual]
